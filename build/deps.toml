# Pinned versions for Reel's release build.
#
# Two kinds of entries:
#
# - [bundled.*]  — built from source by scripts/macos/build_deps.sh and
#                  copied into Reel.app/Contents/Frameworks/ at release time.
#                  Consumed by CI (.github/workflows/release.yml) and by
#                  `make build-deps` locally.
#
# - [plugins.*]  — not built here. Pinned for the Reel plugin system, which
#                  downloads these on first plugin use into
#                  ~/Library/Application Support/Reel/plugins/. Included
#                  here so the pinned version lives in one place.
#
# Bump a version, verify the sha256 on first build (see build_deps.sh — it
# prints the computed sha256 and errors if the pinned value is "PENDING" or
# mismatched), then commit.
#
# The bundled FFmpeg is configured with --enable-gpl and links libx264 +
# libx265, so the resulting binary is GPL-2.0-or-later. License texts for
# every bundled dep are copied into Reel.app/Contents/Resources/licenses/
# at bundle time; corresponding source tarballs are attached to the GitHub
# Release alongside the app zip (see docs/RELEASING.md).


# --- Bundled (built into Reel.app) ---------------------------------------

[bundled.ffmpeg]
version = "7.1.1"
url     = "https://ffmpeg.org/releases/ffmpeg-7.1.1.tar.xz"
sha256  = "733984395e0dbbe5c046abda2dc49a5544e7e0e1e2366bba849222ae9e3a03b1"
license = "GPL-2.0-or-later"
# Configure flags are applied in the order listed. Enables GPL + non-free-
# free codecs we actually use; leaves out patent-encumbered extras (fdk-aac,
# openh264) and anything not GPL-compatible.
configure_flags = [
    "--enable-gpl",
    "--enable-version3",
    "--enable-pthreads",
    "--enable-shared",
    "--disable-static",
    "--pkg-config-flags=--static",
    "--disable-debug",
    "--disable-doc",
    "--disable-ffplay",
    "--enable-libx264",
    "--enable-libx265",
    "--enable-libvpx",
    "--enable-libopus",
    "--enable-libmp3lame",
    "--enable-videotoolbox",
    "--enable-audiotoolbox",
]

[bundled.x264]
# x264 does not cut tarball releases; pin the current HEAD of the upstream
# `stable` branch.
version = "stable-b35605a"
url     = "https://code.videolan.org/videolan/x264.git"
ref     = "b35605ace3ddf7c1a5d67a2eb553f034aef41d55"
license = "GPL-2.0-or-later"

[bundled.x265]
version = "4.2"
url     = "https://bitbucket.org/multicoreware/x265_git/downloads/x265_4.2.tar.gz"
sha256  = "40b1ea0453e0309f0eba934e0ddf533f8f6295966679e8894e8f1c1c8d5e1210"
license = "GPL-2.0-or-later"

[bundled.libvpx]
version = "1.15.0"
url     = "https://github.com/webmproject/libvpx/archive/refs/tags/v1.15.0.tar.gz"
sha256  = "e935eded7d81631a538bfae703fd1e293aad1c7fd3407ba00440c95105d2011e"
license = "BSD-3-Clause"

[bundled.libopus]
version = "1.5.2"
url     = "https://github.com/xiph/opus/releases/download/v1.5.2/opus-1.5.2.tar.gz"
sha256  = "65c1d2f78b9f2fb20082c38cbe47c951ad5839345876e46941612ee87f9a7ce1"
license = "BSD-3-Clause"

[bundled.libmp3lame]
version = "3.100"
url     = "https://downloads.sourceforge.net/project/lame/lame/3.100/lame-3.100.tar.gz"
sha256  = "ddfe36cab873794038ae2c1210557ad34857a4b6bdc515785d1da9e175b1da1e"
license = "LGPL-2.0-or-later"


# --- Plugins (downloaded on first plugin use by Reel at runtime) ---------

[plugins.facefusion]
# Pinned for the Reel plugin system. When the user enables the FaceFusion
# plugin for the first time, Reel fetches this tag, creates a per-plugin
# venv, pip-installs its requirements, and lets FaceFusion itself download
# ONNX model weights from their upstream sources (InsightFace, GFPGAN, etc.
# — each under its own license and the user's acceptance of the source ToS).
version = "3.4.0"
url     = "https://github.com/facefusion/facefusion.git"
ref     = "3.4.0"
license = "OpenRAIL-AS"
# OpenRAIL-AS imposes use restrictions (no deepfakes without consent, no
# harassment, etc.) that pass through to Reel users. The plugin installer
# surfaces these at enable-time; see docs/PLUGINS.md (to be added with the
# plugin UI work).
